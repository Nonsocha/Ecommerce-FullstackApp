name: Deploy Frontend-api and Backend-webapp

on:
  push:
    branches:
      - main  # Adjust to your main branch name

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'  # Use the Node.js version you need
      
      - name: Install frontend dependencies
        working-directory: frontend-webapp
        run: npm install
      
      - name: Build frontend
        working-directory: frontend-webapp
        run: npm run build  # Adjust if your build script is named differently

  build-backend:
    runs-on: ubuntu-latest
    needs: build-frontend  # This job depends on the frontend build
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'  # Use the Node.js version you need
      
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      
      - name: Run backend tests
        working-directory: backend
        run: npm test  # Optional: Run tests before deploying
        jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build Docker Image
        run: docker build -t api-image ./frontend

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build Docker Image
        run: docker build -t webapp-image ./backend
      
