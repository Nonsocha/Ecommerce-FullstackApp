name: Deploy Frontend-webapp and Backend

on:
  push:
    branches:
      - main  # Adjust to your main branch name

jobs:
  build-frontend-webapp:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'  # Use the Node.js version you need
      
      - name: Install frontend dependencies
        working-directory: frontend-webapp
        run: npm install
      
      - name: Build frontend
        working-directory: frontend-webapp
        run: npm run build  # Adjust if your build script is named differently

      - name: Build Docker Image for Frontend
        run: docker build -t my-frontend-image ./frontend-webapp  # Replace with your desired image name

  build-backend:
    runs-on: ubuntu-latest
    needs: build-frontend  # This job depends on the frontend build
    steps:
      - name: Checkout code
        uses: actions/checkout@v2
      
      - name: Set up Node.js
        uses: actions/setup-node@v2
        with:
          node-version: '14'  # Use the Node.js version you need
      
      - name: Install backend dependencies
        working-directory: backend
        run: npm install
      
      - name: Run backend tests
        working-directory: backend
        run: npm test  # Optional: Run tests before deploying

      - name: Build Docker Image for Backend
        run: docker build -t my-backend-image ./backend  # Replace with your desired image name
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin your-aws-account-id.dkr.ecr.us-east-1.amazonaws.com

      - name: Build and Tag Docker Image for Frontend
        run: |
          docker build -t my-frontend-image:latest ./frontend-webapp
          docker tag my-frontend-image:latest your-aws-account-id.dkr.ecr.us-east-1.amazonaws.com/my-frontend-image:latest

      - name: Push Docker Image to Amazon ECR
        run: docker push your-aws-account-id.dkr.ecr.us-east-1.amazonaws.com/my-frontend-image:latest
